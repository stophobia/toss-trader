name: E2E Tests (Playwright)

# Vercel preview URL 자동 검증
# PR마다 + main push마다 실행
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # 수동 트리거

# 동시 실행 제한 (CI 리소스)
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (chromium + webkit)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build
        run: npm run build

      - name: Run Vitest unit tests
        run: npm test

      - name: Run Playwright E2E (Vercel preview URL)
        env:
          # Vercel PR preview URL (PR마다 자동 생성)
          # 예: https://toss-trader-git-v120-pr-42-username.vercel.app
          PLAYWRIGHT_BASE_URL: ${{ secrets.VERCEL_PREVIEW_URL || 'http://localhost:3000' }}
          CI: "true"
        run: npx playwright test --project=chromium --project=webkit
        continue-on-error: false

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
